name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: |
          dotnet restore src/ClaudePortable.Core/ClaudePortable.Core.csproj
          dotnet restore src/ClaudePortable.Targets/ClaudePortable.Targets.csproj
          dotnet restore src/ClaudePortable.Scheduler/ClaudePortable.Scheduler.csproj
          dotnet restore src/ClaudePortable.App/ClaudePortable.App.csproj
          dotnet restore tests/ClaudePortable.Tests/ClaudePortable.Tests.csproj

      - name: Build
        run: |
          dotnet build src/ClaudePortable.App/ClaudePortable.App.csproj --configuration Release --no-restore
          dotnet build tests/ClaudePortable.Tests/ClaudePortable.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ClaudePortable.Tests/ClaudePortable.Tests.csproj --configuration Release --no-build --logger "console;verbosity=minimal"
