name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. 0.1.0)"
        required: true
        default: "0.1.1"

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Install WiX 7
        run: dotnet tool install --global wix --version 7.0.0

      - name: Accept WiX EULA
        run: wix eula accept wix7

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "${{ inputs.version }}"
          }
          Write-Output "version=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ClaudePortable.slnx

      - name: Test
        run: dotnet test --configuration Release

      # --- MSI artifact ---
      - name: Publish App (multi-file, for MSI)
        run: |
          dotnet publish src/ClaudePortable.App/ClaudePortable.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:InvariantGlobalization=false `
            -p:InformationalVersion=${{ steps.ver.outputs.version }} `
            --output src/ClaudePortable.Installer/staging

      - name: Build MSI
        run: |
          dotnet build src/ClaudePortable.Installer/ClaudePortable.Installer.wixproj `
            --configuration Release `
            -p:InstallerVersion=${{ steps.ver.outputs.version }} `
            -p:PublishStageDir=${{ github.workspace }}\src\ClaudePortable.Installer\staging

      # --- Portable single-file exe ---
      - name: Publish portable single-file exe
        run: |
          dotnet publish src/ClaudePortable.App/ClaudePortable.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:DebugType=embedded `
            -p:InvariantGlobalization=false `
            -p:AssemblyVersion=${{ steps.ver.outputs.version }}.0 `
            -p:FileVersion=${{ steps.ver.outputs.version }}.0 `
            -p:InformationalVersion=${{ steps.ver.outputs.version }} `
            --output dist/portable

      - name: Stamp portable filename + SHA256
        id: hash
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $src = "dist/portable/claudeportable.exe"
          $dst = "ClaudePortable-$ver-portable.exe"
          Copy-Item $src $dst -Force
          $h = (Get-FileHash $dst -Algorithm SHA256).Hash.ToLowerInvariant()
          "$h  $dst" | Out-File "$dst.sha256" -Encoding ascii
          Write-Output "exe=$dst" >> $env:GITHUB_OUTPUT
          Write-Output "sha=$dst.sha256" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $h"

      # --- Upload ---
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePortable-${{ steps.ver.outputs.version }}-msi
          path: src/ClaudePortable.Installer/bin/Release/ClaudePortable-${{ steps.ver.outputs.version }}.msi
          if-no-files-found: error

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePortable-${{ steps.ver.outputs.version }}-portable
          path: |
            ${{ steps.hash.outputs.exe }}
            ${{ steps.hash.outputs.sha }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/ClaudePortable.Installer/bin/Release/ClaudePortable-${{ steps.ver.outputs.version }}.msi
            ${{ steps.hash.outputs.exe }}
            ${{ steps.hash.outputs.sha }}
          generate_release_notes: true
          body: |
            ## Downloads

            - `ClaudePortable-${{ steps.ver.outputs.version }}-portable.exe` - single-file, no install required. Double-click to run.
            - `ClaudePortable-${{ steps.ver.outputs.version }}.msi` - per-machine installer with Start-menu shortcut.
            - `ClaudePortable-${{ steps.ver.outputs.version }}-portable.exe.sha256` - checksum for portable exe.

            ## First-run warning (unsigned)

            Both artifacts are **unsigned**. Windows SmartScreen will warn you on first run.

            **Portable exe:**
            1. Right-click the downloaded file -> Properties -> check "Unblock" at the bottom -> OK.
            2. Double-click to run.

            **Or verify the SHA256 first:**
            ```powershell
            (Get-FileHash .\ClaudePortable-${{ steps.ver.outputs.version }}-portable.exe -Algorithm SHA256).Hash
            ```
            Match against the `.sha256` file. Then unblock + run.
